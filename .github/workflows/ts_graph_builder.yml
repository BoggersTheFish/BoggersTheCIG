name: TS Graph Builder (Near-Real-Time)

on:
  schedule:
    - cron: '*/10 * * * *'   # Every 10 minutes
  workflow_dispatch:

jobs:
  build_graph:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run incremental graph build
      run: python src/build_graph.py --incremental True

    - name: Commit updated files (only if changed)
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add "obsidian/TS-Knowledge-Vault/snapshots/coherence-trend.png" "eval/coherence_log.jsonl"
        git commit -m "TS auto-evolve: coherence-trend.png + log [10min]" || echo "No changes to commit"
        git push
